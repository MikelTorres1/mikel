<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mikel</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mikel">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0a0f'/%3E%3Ctext x='90' y='115' font-family='Georgia,serif' font-size='90' font-style='italic' fill='%236e40f5' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
    --border: #2a2a3a; --text: #e8e8f0; --text-muted: #6b6b80;
    --accent: #6e40f5; --accent2: #3b82f6; --accent3: #34d399;
    --uofa: #34d399; --uofa-light: #0d2e22;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; }

  /* SITE LOCK */
  #siteLock {
    position:fixed; inset:0; background:var(--bg); z-index:9999;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .lock-card {
    background:var(--surface); border:1px solid var(--border); border-radius:24px;
    padding:48px 44px; width:100%; max-width:400px; text-align:center;
    box-shadow:0 8px 40px rgba(0,0,0,0.6); animation:fadeUp 0.4s ease;
  }
  .lock-icon {
    width:72px; height:72px; background:linear-gradient(135deg,var(--accent),#3d1fa8);
    border-radius:20px; display:flex; align-items:center; justify-content:center;
    font-size:32px; margin:0 auto 20px; box-shadow:0 4px 24px rgba(110,64,245,0.4);
  }
  .lock-name {
    font-family:'DM Serif Display',serif; font-size:36px; font-style:italic;
    color:var(--accent); margin-bottom:6px;
  }
  .lock-subtitle { font-size:13px; color:var(--text-muted); margin-bottom:28px; }
  .lock-input {
    width:100%; padding:14px 18px; border:1.5px solid var(--border); border-radius:12px;
    font-family:'JetBrains Mono',monospace; font-size:18px; letter-spacing:4px;
    text-align:center; background:var(--surface2); color:var(--text);
    outline:none; transition:border 0.2s,background 0.2s; margin-bottom:14px;
  }
  .lock-input:focus { border-color:var(--accent); background:white; }
  .lock-input.error { border-color:var(--accent); animation:shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .lock-btn {
    width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),#3d1fa8);
    color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif;
    font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; letter-spacing:0.3px;
  }
  .lock-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(110,64,245,0.4); }
  .lock-error { margin-top:12px; font-size:12px; color:var(--accent); min-height:18px; }

  /* HEADER */
  header {
    background:rgba(10,10,15,0.85); border-bottom:1px solid var(--border);
    padding:0 32px; display:flex; align-items:center; justify-content:space-between;
    height:64px; position:sticky; top:0; z-index:100;
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  }
  .logo { font-family:'DM Serif Display',serif; font-size:24px; font-style:italic; color:var(--accent); letter-spacing:-0.3px; }
  .header-right { display:flex; align-items:center; gap:20px; }
  .live-clock { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-muted); background:var(--surface2); padding:6px 12px; border-radius:8px; }
  .date-display { font-size:13px; color:var(--text-muted); }

  /* TABS */
  .tab-nav { background:rgba(10,10,15,0.85); border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; gap:4px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
  .tab-btn { padding:14px 20px; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.2s; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .page { display:none; }
  .page.active { display:block; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* GREETING */
  .greeting-bar { max-width:1400px; margin:0 auto; padding:20px 32px 4px; display:flex; justify-content:space-between; align-items:flex-end; }
  .greeting-title { font-family:'DM Serif Display',serif; font-size:30px; line-height:1.1; }
  .greeting-title .name { color:var(--accent); font-style:italic; }
  .greeting-subtitle { font-size:13px; color:var(--text-muted); margin-top:4px; }
  .daily-quote { font-size:12px; color:var(--text-muted); font-style:italic; max-width:300px; text-align:right; line-height:1.5; }

  /* MAIN GRID */
  .main { padding:28px 32px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; max-width:1400px; margin:0 auto; }
  .card { background:var(--surface); border-radius:16px; border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; animation:fadeUp 0.5s ease both; }
  .card:nth-child(1){animation-delay:0.05s} .card:nth-child(2){animation-delay:0.1s}
  .card:nth-child(3){animation-delay:0.15s} .card:nth-child(4){animation-delay:0.2s}
  .card:nth-child(5){animation-delay:0.25s} .card:nth-child(6){animation-delay:0.3s}
  .card-header { padding:18px 22px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .card-title { font-family:'DM Serif Display',serif; font-size:16px; display:flex; align-items:center; gap:8px; }
  .card-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .icon-red{background:#fdf0ee} .icon-blue{background:#eef3fd} .icon-green{background:#edfaf3} .icon-yellow{background:#fdf9ee}
  .icon-uofa{background:var(--uofa-light);color:var(--uofa);font-weight:800;font-size:11px;font-family:'DM Serif Display',serif;}
  .card-body { padding:18px 22px; }

  /* STATS */
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; animation:fadeUp 0.5s ease both; }
  .stat-card:nth-child(1){animation-delay:0.3s} .stat-card:nth-child(2){animation-delay:0.35s}
  .stat-card:nth-child(3){animation-delay:0.4s} .stat-card:nth-child(4){animation-delay:0.45s}
  .stat-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; font-weight:600; margin-bottom:8px; }
  .stat-value { font-family:'DM Serif Display',serif; font-size:28px; line-height:1; margin-bottom:4px; }
  .stat-sub { font-size:11px; color:var(--text-muted); }

  /* POMODORO */
  .pomodoro-display { text-align:center; padding:12px 0; }
  .pomo-mode-tabs { display:flex; gap:6px; margin-bottom:20px; background:var(--surface2); border-radius:10px; padding:4px; }
  .pomo-tab { flex:1; padding:6px 10px; border:none; background:transparent; border-radius:7px; font-size:12px; font-family:'DM Sans',sans-serif; color:var(--text-muted); cursor:pointer; transition:all 0.2s; font-weight:500; }
  .pomo-tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.08); }
  .timer-ring { position:relative; width:140px; height:140px; margin:0 auto 18px; }
  .timer-ring svg { transform:rotate(-90deg); }
  .timer-ring-bg { fill:none; stroke:var(--surface2); stroke-width:6; }
  .timer-ring-progress { fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; stroke-dasharray:377; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear,stroke 0.3s; }
  .timer-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
  .timer-text .time { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:500; line-height:1; display:block; }
  .timer-text .session-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px; display:block; }
  .pomo-controls { display:flex; gap:10px; justify-content:center; }
  .btn { border:none; cursor:pointer; border-radius:10px; font-family:'DM Sans',sans-serif; font-weight:500; transition:all 0.15s; }
  .btn-primary { background:var(--accent); color:white; padding:10px 28px; font-size:13px; }
  .btn-primary:hover { background:#b33a23; transform:translateY(-1px); }
  .btn-ghost { background:var(--surface2); color:var(--text-muted); padding:10px 16px; font-size:13px; }
  .btn-ghost:hover { background:var(--border); color:var(--text); }
  .pomo-sessions { margin-top:14px; display:flex; gap:6px; justify-content:center; }
  .pomo-dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:background 0.3s; }
  .pomo-dot.done { background:var(--accent); }

  /* TODO */
  .todo-input-row { display:flex; gap:8px; margin-bottom:14px; }
  .input-field { flex:1; padding:9px 14px; border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; background:var(--surface2); color:var(--text); outline:none; transition:border 0.2s; }
  .input-field:focus { border-color:var(--accent); background:var(--surface2); color:var(--text); }
  .input-field::placeholder { color:var(--text-muted); }
  .btn-add { background:var(--accent); color:white; padding:9px 16px; font-size:18px; border-radius:10px; border:none; cursor:pointer; line-height:1; transition:all 0.15s; }
  .btn-add:hover { background:#b33a23; transform:scale(1.05); }
  .priority-select { padding:9px 10px; border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:12px; background:var(--surface2); color:var(--text-muted); outline:none; cursor:pointer; }
  .todo-list { max-height:240px; overflow-y:auto; }
  .todo-item { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--surface2); animation:fadeIn 0.2s ease; }
  .todo-item:last-child { border-bottom:none; }
  .todo-check { width:18px; height:18px; border-radius:5px; border:2px solid var(--border); cursor:pointer; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; background:white; }
  .todo-check.checked { background:var(--accent3); border-color:var(--accent3); color:white; font-size:11px; }
  .todo-text-wrap { flex:1; }
  .todo-text { font-size:13px; line-height:1.4; transition:all 0.2s; }
  .todo-text.done { text-decoration:line-through; color:var(--text-muted); }
  .todo-meta { display:flex; align-items:center; gap:6px; margin-top:3px; }
  .priority-badge { font-size:10px; padding:2px 7px; border-radius:20px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
  .priority-high { background:#fdf0ee; color:var(--accent); }
  .priority-medium { background:#fdf9ee; color:#b8860b; }
  .priority-low { background:#edfaf3; color:var(--accent3); }
  .todo-delete { background:none; border:none; color:var(--border); cursor:pointer; font-size:16px; padding:0 2px; transition:color 0.15s; line-height:1; }
  .todo-delete:hover { color:var(--accent); }
  .todo-empty { text-align:center; color:var(--text-muted); padding:24px 0; font-size:13px; }
  .progress-wrap { margin-top:12px; }
  .progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:6px; }
  .progress-bar { height:5px; background:var(--surface2); border-radius:10px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent3); border-radius:10px; transition:width 0.5s ease; }

  /* NOTES */
  .notes-list { display:flex; flex-direction:column; gap:10px; max-height:280px; overflow-y:auto; }
  .note-card { background:var(--surface2); border-radius:10px; padding:12px 14px; animation:fadeIn 0.2s ease; border-left:3px solid transparent; }
  .note-card.reminder { border-left-color:var(--accent2); }
  .note-card.idea { border-left-color:#e8a020; }
  .note-card.important { border-left-color:var(--accent); }
  .note-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .note-type { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); }
  .note-delete { background:none; border:none; color:var(--border); cursor:pointer; font-size:14px; transition:color 0.15s; line-height:1; }
  .note-delete:hover { color:var(--accent); }
  .note-text { font-size:13px; line-height:1.5; }
  .note-date { font-size:11px; color:var(--text-muted); margin-top:6px; font-family:'JetBrains Mono',monospace; }
  .note-add-area { margin-bottom:14px; }
  .note-textarea { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; background:var(--surface2); color:var(--text); outline:none; resize:none; height:70px; transition:border 0.2s; margin-bottom:8px; }
  .note-textarea:focus { border-color:var(--accent2); background:var(--surface); color:var(--text); }
  .note-textarea::placeholder { color:var(--text-muted); }
  .note-controls { display:flex; gap:8px; align-items:center; }
  .note-type-select { padding:8px 10px; border:1px solid var(--border); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:12px; background:var(--surface2); color:var(--text); outline:none; cursor:pointer; }
  .btn-blue { background:var(--accent2); color:white; padding:8px 18px; font-size:13px; }
  .btn-blue:hover { background:#235dab; transform:translateY(-1px); }

  /* WORK SCHEDULE */
  .work-shift { display:flex; align-items:flex-start; gap:12px; padding:10px 12px; border-radius:10px; margin-bottom:8px; border-left:3px solid var(--accent2); background:#eef3fd; animation:fadeIn 0.2s ease; }
  .work-shift.today { border-left-color:var(--accent); background:#fdf0ee; }
  .work-shift.past { opacity:0.55; background:var(--surface2); border-left-color:var(--border); }
  .shift-date-col { min-width:60px; }
  .shift-day { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
  .shift-date-num { font-family:'DM Serif Display',serif; font-size:22px; line-height:1; }
  .shift-details { flex:1; }
  .shift-title { font-size:13px; font-weight:500; }
  .shift-time { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); margin-top:2px; }
  .shift-badge { font-size:10px; padding:2px 8px; border-radius:20px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; align-self:flex-start; }
  .badge-today { background:#fdf0ee; color:var(--accent); }
  .badge-upcoming { background:#eef3fd; color:var(--accent2); }
  .badge-past { background:var(--surface2); color:var(--text-muted); }
  .work-list { max-height:280px; overflow-y:auto; }
  .work-filter-tabs { display:flex; gap:6px; margin-bottom:12px; }
  .work-tab { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; font-size:11px; font-family:'DM Sans',sans-serif; font-weight:500; color:var(--text-muted); cursor:pointer; transition:all 0.15s; }
  .work-tab.active { background:var(--accent2); border-color:var(--accent2); color:white; }

  /* COMPACT BANNER */
  .compact-banner { border-radius:12px; padding:12px 14px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
  .compact-banner-blue { background:linear-gradient(135deg,var(--accent2) 0%,#1a55a8 100%); }
  .compact-banner-left { display:flex; align-items:center; gap:10px; }
  .compact-banner-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .compact-banner-title { color:white; font-weight:600; font-size:13px; }
  .compact-banner-sub { color:rgba(255,255,255,0.7); font-size:11px; margin-top:1px; }

  /* WEEK STRIP */
  .compact-week { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:14px; }
  .compact-week-day { text-align:center; padding:6px 2px; border-radius:8px; border:1px solid var(--border); }
  .compact-week-day.has-shift { background:#eef3fd; border-color:rgba(42,107,200,0.3); }
  .compact-week-day.is-today { background:var(--accent2); border-color:var(--accent2); color:white; }
  .compact-week-day.has-shift.is-today { background:var(--accent); border-color:var(--accent); }
  .cwd-name { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted); }
  .compact-week-day.is-today .cwd-name,.compact-week-day.is-today .cwd-num { color:white !important; }
  .cwd-num { font-family:'DM Serif Display',serif; font-size:16px; line-height:1.1; margin-top:1px; }
  .cwd-dot { width:5px; height:5px; border-radius:50%; background:var(--accent2); margin:3px auto 0; }

  /* UOFA */
  .uofa-banner { background:linear-gradient(135deg,#1a6e3e 0%,#0d3d22 100%); border-radius:12px; padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .uofa-banner-left { display:flex; align-items:center; gap:10px; }
  .uofa-logo-mark { width:36px; height:36px; background:white; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#2a9d5c; font-family:'DM Serif Display',serif; }
  .uofa-banner-title { color:white; font-weight:600; font-size:13px; }
  .uofa-banner-sub { color:rgba(255,255,255,0.7); font-size:11px; margin-top:1px; }
  .uofa-semester-badge { background:rgba(255,255,255,0.2); color:white; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .uofa-week-overview { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:14px; }
  .uofa-week-day { text-align:center; padding:8px 4px; border-radius:10px; border:1px solid var(--border); cursor:pointer; transition:all 0.15s; }
  .uofa-week-day.active { background:var(--uofa); border-color:var(--uofa); color:white; }
  .uofa-week-day.has-class:not(.active) { background:var(--uofa-light); border-color:rgba(204,0,51,0.25); }
  .uofa-week-day:hover:not(.active) { border-color:var(--uofa); }
  .week-day-name { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:inherit; }
  .week-day-count { font-family:'DM Serif Display',serif; font-size:20px; line-height:1.2; margin-top:2px; }
  .week-day-dots { display:flex; justify-content:center; gap:3px; margin-top:4px; }
  .week-class-dot { width:5px; height:5px; border-radius:50%; }
  .uofa-class-list { display:flex; flex-direction:column; gap:10px; max-height:320px; overflow-y:auto; }
  .uofa-class-card { border-radius:12px; border:1px solid var(--border); overflow:hidden; animation:fadeIn 0.2s ease; transition:transform 0.15s,box-shadow 0.15s; }
  .uofa-class-card:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.08); }
  .uofa-class-top { padding:12px 14px; display:flex; align-items:flex-start; gap:10px; }
  .uofa-color-bar { width:4px; border-radius:4px; flex-shrink:0; align-self:stretch; min-height:44px; }
  .uofa-class-info { flex:1; }
  .uofa-class-code { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
  .uofa-class-name { font-size:13px; font-weight:600; line-height:1.3; }
  .uofa-class-instructor { font-size:11px; color:var(--text-muted); margin-top:4px; }
  .uofa-time-chip { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; background:var(--surface2); border:1px solid var(--border); padding:3px 9px; border-radius:6px; color:var(--text); white-space:nowrap; flex-shrink:0; align-self:flex-start; }
  .uofa-class-bottom { padding:8px 14px 10px 28px; background:var(--surface2); display:flex; gap:16px; flex-wrap:wrap; }
  .uofa-class-meta { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); }
  .uofa-no-class { text-align:center; padding:28px 0; color:var(--text-muted); font-size:13px; }

  /* CALENDAR */
  .cal-page { padding:28px 32px; max-width:1400px; margin:0 auto; }

  .cal-nav { display:flex; align-items:center; gap:10px; }
  .cal-nav-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer; transition:all 0.15s; }
  .cal-nav-btn:hover { background:var(--border); color:var(--text); }
  .cal-month-label { font-family:'DM Serif Display',serif; font-size:18px; min-width:180px; text-align:center; }
  .cal-today-btn { background:var(--accent); color:white; border:none; border-radius:8px; padding:7px 16px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
  .cal-today-btn:hover { background:#b33a23; }
  .cal-legend { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .cal-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); font-weight:500; }
  .cal-legend-dot { width:10px; height:10px; border-radius:3px; }
  .cal-grid-wrap { background:var(--surface); border-radius:16px; border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; }
  .cal-day-headers { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border); }
  .cal-day-header { padding:10px 0; text-align:center; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); border-right:1px solid var(--surface2); }
  .cal-day-header:last-child { border-right:none; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
  .cal-cell { min-height:100px; padding:8px; border-right:1px solid var(--surface2); border-bottom:1px solid var(--surface2); transition:background 0.15s; }
  .cal-cell:nth-child(7n) { border-right:none; }
  .cal-cell.other-month { background:var(--bg); }
  .cal-cell.is-today { background:#fff8f7; }
  .cal-cell:hover { background:var(--surface2); }
  .cal-date-num { font-family:'DM Serif Display',serif; font-size:15px; line-height:1; color:var(--text-muted); margin-bottom:5px; }
  .cal-cell.other-month .cal-date-num { opacity:0.35; }
  .cal-event { font-size:10px; font-weight:500; padding:2px 6px; border-radius:4px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.5; }
  .cal-event.type-class { background:rgba(42,157,92,0.12); color:#1a6e3e; }
  .cal-event.type-work { background:rgba(42,107,200,0.12); color:#1a55a8; }
  .cal-event.type-personal { background:rgba(42,184,122,0.12); color:#1a8a5a; }
  .cal-layout { display:grid; grid-template-columns:1fr 300px; gap:20px; align-items:start; }
  .cal-side { display:flex; flex-direction:column; gap:16px; }
  .cal-side-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); }
  .cal-side-header { padding:14px 16px; border-bottom:1px solid var(--border); font-family:'DM Serif Display',serif; font-size:15px; display:flex; align-items:center; gap:8px; }
  .cal-side-body { padding:12px 16px; }
  .cal-today-events { display:flex; flex-direction:column; gap:8px; max-height:360px; overflow-y:auto; }
  .cal-today-event { display:flex; gap:10px; align-items:flex-start; padding:9px 10px; border-radius:9px; border-left:3px solid; }
  .cal-today-event.type-class { background:rgba(42,157,92,0.07); border-color:#2a9d5c; }
  .cal-today-event.type-work { background:rgba(42,107,200,0.07); border-color:var(--accent2); }
  .cal-today-event.type-personal { background:rgba(42,184,122,0.07); border-color:var(--accent3); }
  .cal-today-time { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); min-width:52px; padding-top:1px; }
  .cal-today-title { font-size:12px; font-weight:500; line-height:1.3; }
  .cal-today-sub { font-size:10px; color:var(--text-muted); margin-top:2px; }
  .cal-add-row { display:flex; flex-direction:column; gap:8px; }

  .cal-add-row select { padding:8px 10px; border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:12px; background:var(--surface2); color:var(--text); outline:none; }
  .btn-add-event { background:var(--accent3); color:white; border:none; border-radius:10px; padding:9px; font-size:13px; font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.15s; }

  .cal-empty { text-align:center; color:var(--text-muted); padding:20px 0; font-size:12px; }

  /* HERO CHIPS */
  .hero-chip { background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.75);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;text-decoration:none;transition:all 0.15s;white-space:nowrap; }
  .hero-chip:hover { background:rgba(255,255,255,0.16);color:white; }

  /* QUICK LINKS */
  .qlink { display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;border-radius:14px;border:1px solid var(--border);background:var(--surface);text-decoration:none;color:var(--text);transition:all 0.18s;gap:6px;cursor:pointer; }

  @media (max-width:700px) { .main { grid-template-columns:1fr; padding:16px; } .card:nth-child(4) { grid-column:auto; } header { padding:0 16px; } .greeting-bar { padding:16px 16px 4px; flex-direction:column; align-items:flex-start; gap:8px; } .daily-quote { text-align:left; } }

  /* STUDY VISUALS */
  .vis-type-btn { padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s; }
  .vis-type-btn.active { background:#f59e0b;border-color:#f59e0b;color:white; }
  .vis-type-btn:hover:not(.active) { border-color:#f59e0b;color:#f59e0b; }
  .vis-class-btn { padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s; }
  .vis-class-btn.active { background:var(--accent);border-color:var(--accent);color:white; }
  .vis-class-btn:hover:not(.active) { border-color:var(--accent);color:var(--accent); }
  .vis-mindmap-center { background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border-radius:16px;padding:16px 24px;font-weight:700;font-size:16px;text-align:center;box-shadow:0 4px 20px rgba(245,158,11,0.3);margin-bottom:24px; }
  .vis-branch { display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--surface2);border-radius:12px;border-left:4px solid #f59e0b;margin-bottom:10px; }
  .vis-branch-icon { font-size:20px;flex-shrink:0; }
  .vis-branch-title { font-weight:700;font-size:14px;margin-bottom:4px; }
  .vis-branch-points { font-size:12px;color:var(--text-muted);line-height:1.6; }
  .vis-flow-box { background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:14px 18px;text-align:center; }
  .vis-flow-box.highlight { background:rgba(245,158,11,0.1);border-color:#f59e0b; }
  .vis-compare-col { flex:1;background:var(--surface2);border-radius:12px;padding:16px; }
  .vis-compare-header { font-weight:700;font-size:14px;padding:8px 12px;border-radius:8px;text-align:center;margin-bottom:12px; }
  .vis-compare-item { font-size:12px;padding:6px 8px;border-radius:6px;margin-bottom:6px;line-height:1.4;background:rgba(255,255,255,0.04); }
  .vis-timeline-item { display:flex;gap:16px;margin-bottom:20px;align-items:flex-start; }
  .vis-timeline-dot { width:14px;height:14px;border-radius:50%;background:#f59e0b;flex-shrink:0;margin-top:3px;box-shadow:0 0 0 4px rgba(245,158,11,0.2); }
  .vis-concept-card { background:var(--surface2);border-radius:12px;padding:16px;border-top:3px solid #f59e0b; }
  .vis-concept-term { font-weight:700;font-size:14px;color:#f59e0b;margin-bottom:6px; }
  .vis-concept-def { font-size:12px;color:var(--text-muted);line-height:1.6; }
  .vis-summary-card { background:linear-gradient(135deg,rgba(245,158,11,0.06),rgba(217,119,6,0.04));border:1px solid rgba(245,158,11,0.2);border-radius:14px;padding:20px; }

  .ai-suggestion { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap; }
  .ai-suggestion:hover { border-color:var(--accent);color:var(--accent);background:rgba(110,64,245,0.06); }
  .ai-msg { display:flex;gap:10px;align-items:flex-start;animation:fadeIn 0.3s ease; }
  .ai-msg.user { flex-direction:row-reverse; }
  .ai-avatar { width:32px;height:32px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),#3d1fa8);display:flex;align-items:center;justify-content:center;font-size:14px;color:white;margin-top:2px; }
  .ai-msg.user .ai-avatar { background:var(--surface2);border:1px solid var(--border);font-size:16px; }
  .ai-bubble { max-width:85%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.6;border:1px solid var(--border);background:var(--surface); }
  .ai-msg.user .ai-bubble { background:linear-gradient(135deg,var(--accent),#3d1fa8);color:white;border-color:transparent; }
  .ai-bubble p { margin-bottom:8px; } .ai-bubble p:last-child { margin-bottom:0; }
  .ai-bubble strong { color:var(--accent);font-weight:600; } .ai-msg.user .ai-bubble strong { color:rgba(255,255,255,0.9); }
  .ai-bubble ul { padding-left:16px;margin:6px 0; } .ai-bubble li { margin-bottom:4px; }
  .ai-typing { display:flex;gap:4px;align-items:center;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px; }
  .ai-typing-dot { width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:typingBounce 1.2s infinite; }
  .ai-typing-dot:nth-child(2){animation-delay:0.2s} .ai-typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
</head>

async function loadCalendar() {
  try {
    const res=await fetch('https://corsproxy.io/?'+encodeURIComponent(ICS_URL));
    if(!res.ok) throw new Error();
    parseIcsText(await res.text());
  } catch(e) {
    document.getElementById('icsError').style.display='block';
    document.getElementById('icsErrorText').textContent='Could not load calendar. Try refreshing.';
    document.getElementById('workList').innerHTML='<div class="todo-empty">Could not load shifts 🔄</div>';

function parseIcsText(text) {
  const events=[]; const reg=/BEGIN:VEVENT([\s\S]*?)END:VEVENT/g; let m;
  while((m=reg.exec(text))!==null) {
    const block=m[1];
    const get=k=>{const x=block.match(new RegExp(k+'[^:\\r\\n]*:[\\s]*(.+)'));return x?x[1].replace(/\r/g,'').trim():'';};
    const summary=get('SUMMARY')||'Work Shift', dtstart=get('DTSTART'), dtend=get('DTEND');
    if(!dtstart) continue;

    // ── FIXED: robust ICS date parser that handles timezone offsets correctly ──
    const pd = d => {
      if (!d) return null;
      // Strip timezone ID prefix like "TZID=America/Phoenix:" leaving just the value
      const raw = d.includes(':') ? d.split(':').pop() : d;
      const c = raw.replace(/[^0-9T]/g, '');
      if (c.length < 8) return new Date(d);
      const year  = c.slice(0, 4);
      const month = c.slice(4, 6);
      const day   = c.slice(6, 8);
      const isAllDay = c.length === 8; // no time component at all
      if (isAllDay) {
        // Use noon local time to avoid any timezone boundary bleed
        return new Date(`${year}-${month}-${day}T12:00:00`);
      }
      // Has time — build as local time (no Z suffix) so it stays in the user's timezone
      const hour = c.slice(9, 11) || '00';
      const min  = c.slice(11, 13) || '00';
      // If original had a Z (UTC), convert properly; otherwise treat as local
      if (raw.endsWith('Z')) {
        return new Date(`${year}-${month}-${day}T${hour}:${min}:00Z`);
      }
      return new Date(`${year}-${month}-${day}T${hour}:${min}:00`);
    };

    const start=pd(dtstart), end=pd(dtend);
    if(start&&!isNaN(start)) events.push({summary,start,end});
  }
  events.sort((a,b)=>a.start-b.start); allShifts=events;
  document.getElementById('icsStatus').style.display='flex';
  const upcoming=events.filter(s=>s.start>=new Date(new Date().setHours(0,0,0,0))).length;
  document.getElementById('icsSuccessText').textContent=`${events.length} shifts loaded · ${upcoming} upcoming`;
  renderWorkWeekStrip('workWeekStrip',allShifts);
  renderShifts();
  renderCal();
}

    return `<div class="compact-week-day ${hasShift?'has-shift':''} ${isToday?'is-today':''}">

}

let calOffset=0;
let personalEvents=[];
let calSelectedDate = new Date();

function getEventsForDate(date) {
  const all=[];
  const classStart=new Date('2026-01-14'), classEnd=new Date('2026-05-06');
  uofaClasses.forEach(c=>{
    if(date>=classStart&&date<=classEnd&&c.days.includes(date.getDay()))
      all.push({title:c.name,sub:c.time,code:c.code,type:'class',color:c.color,room:c.room});
  });
  allShifts.forEach(s=>{
    if(s.start.toDateString()===date.toDateString())
      all.push({title:s.summary,sub:s.start.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+(s.end?' – '+s.end.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):''),type:'work',color:null});
  });
  personalEvents.forEach(e=>{
    if(e.date.toDateString()===date.toDateString())
      all.push({title:e.title,sub:e.time||'',type:'personal',color:null});
  });
  return all;
}

function hasEvents(date) { return getEventsForDate(date).length > 0; }

function renderCal() {
  const now = new Date();
  // Build week starting from Sunday of the week containing calSelectedDate
  const base = new Date(calSelectedDate);
  base.setDate(base.getDate() - base.getDay() + (calOffset * 7));

  // Update banner
  const mNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calBannerMonth').textContent = `${mNames[base.getMonth()]} ${base.getFullYear()}`;

  // Build 7-day strip
  const strip = document.getElementById('calWeekStrip');
  const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(base); d.setDate(base.getDate()+i); return d; });
  
  // Count events per day for subtitle
  const totalEvents = weekDays.reduce((acc,d)=>acc+getEventsForDate(d).length,0);
  document.getElementById('calBannerSub').textContent = `${totalEvents} event${totalEvents!==1?'s':''} this week`;

  strip.innerHTML = weekDays.map(d=>{
    const isToday = d.toDateString()===now.toDateString();
    const isSelected = d.toDateString()===calSelectedDate.toDateString();
    const evs = getEventsForDate(d);
    const dots = [...new Set(evs.map(e=>e.type))].map(t=>{
      const c = t==='class'?'#2a9d5c':t==='work'?'var(--accent2)':'var(--accent3)';
      return `<div style="width:5px;height:5px;border-radius:50%;background:${isSelected?'rgba(255,255,255,0.8)':c};"></div>`;
    }).join('');
    const bg = isSelected ? 'var(--accent2)' : isToday ? '#eef3fd' : 'var(--surface)';
    const border = isSelected ? 'var(--accent2)' : isToday ? 'var(--accent2)' : 'var(--border)';
    const textColor = isSelected ? 'white' : 'var(--text)';
    const dateStr = d.toDateString();

let aiHistory = [];
function buildSystemPrompt() {
  const now = new Date();
  const todayClasses = uofaClasses.filter(c => c.days.includes(now.getDay()));
  const todayShifts = allShifts.filter(s => s.start.toDateString() === now.toDateString());
  const nextShift = allShifts.find(s => s.start >= now);
  const fmt = d => d ? d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
  const fmtDate = d => d ? d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) : '';
  return `You are Mikel's personal assistant inside his private productivity dashboard. Be friendly, direct, helpful — like a smart friend.

ABOUT MIKEL: Mikel Torre · University of Arizona student, Tucson AZ · Spring 2026 · Building this dashboard to stay productive instead of scrolling TikTok

TODAY: ${fmtDate(now)}, ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}

CLASSES (Spring 2026, Jan 14–May 6):
${uofaClasses.map(c=>`- ${c.code}: ${c.name} | ${c.time} | ${c.days.map(d=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]).join('/')} | ${c.room} | ${c.instructor}`).join('\n')}

TODAY'S CLASSES: ${todayClasses.length ? todayClasses.map(c=>`${c.code} at ${c.time}`).join(', ') : 'None'}
TODAY'S WORK: ${todayShifts.length ? todayShifts.map(s=>`${s.summary} at ${fmt(s.start)}`).join(', ') : 'None'}
NEXT SHIFT: ${nextShift ? `${nextShift.summary} on ${fmtDate(nextShift.start)} at ${fmt(nextShift.start)}` : 'Not loaded'}

Keep it concise and conversational. Bullets for lists. Be real.`;
}
async function sendAI() {
  const input = document.getElementById('aiInput');
  const text = input.value.trim(); if(!text) return;
  document.getElementById('aiSuggestions').style.display = 'none';
  appendAIMsg('user', text);
  aiHistory.push({role:'user', content:text});
  input.value = ''; input.style.height = 'auto';
  const btn = document.getElementById('aiSendBtn');
  btn.disabled = true; btn.style.opacity = '0.5';
  const tid = 'typing-'+Date.now(); appendTyping(tid);
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+ANTHROPIC_API_KEY},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:1000,
        messages:[{role:'system',content:buildSystemPrompt()}, ...aiHistory]
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Something went wrong.';
    removeTyping(tid);
    aiHistory.push({role:'assistant',content:reply});
    appendAIMsg('assistant', reply);
  } catch(e) { removeTyping(tid); appendAIMsg('assistant','⚠️ Could not connect. Try again.'); }
  btn.disabled = false; btn.style.opacity = '1';
  scrollAI();
}
function sendSuggestion(btn) {
  document.getElementById('aiInput').value = btn.textContent.replace(/^[^\s]+\s/,'').trim();
  sendAI();
}
function appendAIMsg(role, text) {
  const msgs = document.getElementById('aiMessages');
  const isUser = role==='user';
  let html = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/^- (.+)/gm,'<li>$1</li>').split('\n\n').map(p=>p.trim()?`<p>${p}</p>`:'').join('');
  const d = document.createElement('div');
  d.className = `ai-msg ${isUser?'user':'assistant'}`;
  d.innerHTML = `<div class="ai-avatar">${isUser?'👤':'✦'}</div><div class="ai-bubble">${html||text}</div>`;
  msgs.appendChild(d); scrollAI();
}
function appendTyping(id) {
  const msgs = document.getElementById('aiMessages');
  const d = document.createElement('div');
  d.className='ai-msg assistant'; d.id=id;
  d.innerHTML=`<div class="ai-avatar">✦</div><div class="ai-typing"><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div></div>`;
  msgs.appendChild(d); scrollAI();
}
function removeTyping(id) { document.getElementById(id)?.remove(); }
function scrollAI() { const m=document.getElementById('aiMessages'); if(m) setTimeout(()=>m.scrollTop=m.scrollHeight,50); }

        <span style="font-size:18px;">${typeEmoji[v.type]||'📊'}</span>
        <div style="font-weight:600;font-size:13px;flex:1;">${v.label}</div>
        <button onclick="event.stopPropagation();deleteSaved(${i})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;">×</button>
      </div>
      <div style="font-size:11px;color:var(--text-muted);">${v.notes}</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:6px;font-family:'JetBrains Mono',monospace;">${v.date}</div>
    </div>`).join('');
}
function loadSaved(i) {
  const v=savedVisuals[i];
  document.getElementById('studyOutputLabel').textContent=v.label;
  document.getElementById('studyVisualBox').innerHTML=v.html;
  document.getElementById('studyOutput').style.display='block';
  document.getElementById('studyOutput').scrollIntoView({behavior:'smooth',block:'start'});
  window._currentVisual=v;
}
function deleteSaved(i) { savedVisuals.splice(i,1); localStorage.setItem('savedVisuals',JSON.stringify(savedVisuals)); renderSavedVisuals(); }
renderSavedVisuals();

// ─── STOCKS & CRYPTO ─────────────────────────────────
const TICKERS = [
  {symbol:'AAPL', name:'Apple', type:'stock'},
  {symbol:'TSLA', name:'Tesla', type:'stock'},
  {symbol:'NVDA', name:'Nvidia', type:'stock'},
  {symbol:'SPY',  name:'S&P 500', type:'etf'},
  {symbol:'QQQ',  name:'Nasdaq', type:'etf'},
  {symbol:'BTC-USD', name:'Bitcoin', type:'crypto'},
  {symbol:'ETH-USD', name:'Ethereum', type:'crypto'},
];

async function loadMarkets() {
  const container = document.getElementById('marketTickers');
  if(!container) return;
  try {
    const symbols = TICKERS.map(t => t.symbol).join(',');
    const url = `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketChange`)}`;
    const res = await fetch(url);
    const data = await res.json();
    const quotes = data?.quoteResponse?.result || [];

    if(!quotes.length) throw new Error('No data');

    container.innerHTML = quotes.map(q => {
      const ticker = TICKERS.find(t => t.symbol === q.symbol);
      const change = q.regularMarketChangePercent || 0;
      const price = q.regularMarketPrice || 0;
      const chg = q.regularMarketChange || 0;
      const up = change >= 0;
      const color = up ? '#34d399' : '#f87171';
      const bg = up ? 'rgba(52,211,153,0.06)' : 'rgba(248,113,113,0.06)';
      const arrow = up ? '▲' : '▼';
      const fmt = (n) => n >= 1000 ? n.toLocaleString('en-US', {maximumFractionDigits:0}) : n.toFixed(2);
      return `<div style="background:${bg};border:1px solid ${up?'rgba(52,211,153,0.15)':'rgba(248,113,113,0.15)'};border-radius:12px;padding:12px 14px;cursor:pointer;" onclick="window.open('https://finance.yahoo.com/quote/${q.symbol}','_blank')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${color};">${ticker?.name || q.symbol}</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:1px;">${q.symbol}</div>
          </div>
          <div style="font-size:10px;font-weight:700;color:${color};background:${up?'rgba(52,211,153,0.12)':'rgba(248,113,113,0.12)'};padding:2px 7px;border-radius:20px;">${arrow} ${Math.abs(change).toFixed(2)}%</div>
        </div>
        <div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);">$${fmt(price)}</div>
        <div style="font-size:11px;color:${color};margin-top:2px;">${up?'+':''}${chg.toFixed(2)} today</div>
      </div>`;
    }).join('');

    document.getElementById('marketStatus').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  } catch(e) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;grid-column:1/-1;">Could not load market data. <button onclick="refreshMarkets()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;">Try again</button></div>';
  }
}

function refreshMarkets() {
  document.getElementById('marketTickers').innerHTML = '<div style="text-align:center;padding:16px 0;color:var(--text-muted);font-size:12px;grid-column:1/-1;">⏳ Refreshing...</div>';
  loadMarkets();
}

// ─── FLASHCARDS ───────────────────────────────────────
let fcDeck = [];
let fcIndex = 0;
let fcFlipped = false;
let fcCorrect = 0;
let fcWrong = [];

async function generateFlashcards() {
  const notes = document.getElementById('studyNotesInput').value.trim();
  if(!notes) {
    document.getElementById('studyNotesInput').style.borderColor = '#6e40f5';
    setTimeout(() => document.getElementById('studyNotesInput').style.borderColor = '#2a2a3a', 1500);
    return;
  }
  const btn = document.getElementById('flashcardBtn');
  btn.innerHTML = '⏳ Generating deck...'; btn.disabled = true;

  const classCtx = currentClass ? `This is for ${currentClass}. ` : '';
  const prompt = `${classCtx}Create 8-12 flashcards for studying this topic: "${notes}"

Return ONLY a valid JSON array, no explanation, no backticks:
[
  {"q": "Question on front of card", "a": "Answer on back of card", "hint": "optional short hint"},
  ...
]

Make questions test real understanding, not just memorization. Mix definitions, applications, and examples.`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ANTHROPIC_API_KEY },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 1500, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    let text = data.choices?.[0]?.message?.content || '[]';
    text = text.replace(/```json?/gi,'').replace(/```/g,'').trim();
    const arrStart = text.indexOf('[');
    if(arrStart > 0) text = text.slice(arrStart);
    fcDeck = JSON.parse(text);
    if(!fcDeck.length) throw new Error('Empty deck');
    startFlashcards();
  } catch(e) {
    document.getElementById('flashcardSection').style.display = 'block';
    document.getElementById('fcCard').innerHTML = `<div style="color:#f59e0b;font-size:13px;">⚠️ Could not generate flashcards. Try again.</div>`;
    document.getElementById('fcActions').style.display = 'none';
  }
  btn.innerHTML = '🃏 Make Flashcards'; btn.disabled = false;
}

function startFlashcards() {
  fcIndex = 0; fcFlipped = false; fcCorrect = 0; fcWrong = [];
  document.getElementById('flashcardSection').style.display = 'block';
  document.getElementById('fcScore').style.display = 'none';
  document.getElementById('fcCard').style.display = 'flex';
  document.getElementById('fcActions').style.display = 'none';
  document.getElementById('flashcardSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  showCard();
}

function showCard() {
  if(fcIndex >= fcDeck.length) { showScore(); return; }
  const card = fcDeck[fcIndex];
  fcFlipped = false;
  document.getElementById('fcSide').textContent = `QUESTION ${fcIndex+1}/${fcDeck.length} — tap to flip`;
  document.getElementById('fcText').textContent = card.q;
  document.getElementById('fcHint').textContent = card.hint ? `💡 Hint: ${card.hint}` : '';
  document.getElementById('fcCard').style.background = 'var(--surface)';
  document.getElementById('fcCard').style.borderColor = 'var(--border)';
  document.getElementById('fcActions').style.display = 'none';
  document.getElementById('fcProgress').textContent = `${fcIndex+1} / ${fcDeck.length} · ✓ ${fcCorrect}`;
}

function flipCard() {
  if(fcIndex >= fcDeck.length) return;
  const card = fcDeck[fcIndex];
  fcFlipped = !fcFlipped;
  if(fcFlipped) {
    document.getElementById('fcSide').textContent = 'ANSWER';
    document.getElementById('fcText').textContent = card.a;
    document.getElementById('fcHint').textContent = '';
    document.getElementById('fcCard').style.borderColor = 'rgba(110,64,245,0.4)';
    document.getElementById('fcActions').style.display = 'flex';
  } else {
    document.getElementById('fcSide').textContent = `QUESTION ${fcIndex+1}/${fcDeck.length} — tap to flip`;
    document.getElementById('fcText').textContent = card.q;
    document.getElementById('fcHint').textContent = card.hint ? `💡 Hint: ${card.hint}` : '';
    document.getElementById('fcCard').style.borderColor = 'var(--border)';
    document.getElementById('fcActions').style.display = 'none';
  }
}

function markCard(correct) {
  if(!correct) fcWrong.push(fcDeck[fcIndex]);
  else fcCorrect++;
  fcIndex++;
  showCard();
}

function showScore() {
  document.getElementById('fcCard').style.display = 'none';
  document.getElementById('fcActions').style.display = 'none';
  document.getElementById('fcScore').style.display = 'block';
  const pct = Math.round((fcCorrect / fcDeck.length) * 100);
  const msg = pct === 100 ? "Perfect score! You crushed it 🔥" : pct >= 70 ? "Solid! Keep reviewing the ones you missed." : "Keep studying — you'll get there 💪";
  document.getElementById('fcScoreText').textContent = `${fcCorrect}/${fcDeck.length} correct (${pct}%) — ${msg}`;
  document.getElementById('reviewWrongBtn').style.display = fcWrong.length ? 'block' : 'none';
}

function restartFlashcards() {
  document.getElementById('fcScore').style.display = 'none';
  document.getElementById('fcCard').style.display = 'flex';
  startFlashcards();
}

function reviewWrong() {
  if(!fcWrong.length) return;
  fcDeck = [...fcWrong];
  startFlashcards();
}

function checkIOSInstall() {
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  const isSafari=/safari/i.test(navigator.userAgent)&&!/chrome|crios|fxios/i.test(navigator.userAgent);
  if(isIOS&&!isStandalone&&isSafari){
    const banner=document.createElement('div');
    banner.style.cssText=`position:fixed;bottom:20px;left:16px;right:16px;background:#1a1714;color:white;padding:14px 16px;border-radius:14px;font-size:12px;font-family:'DM Sans',sans-serif;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.3);line-height:1.5;`;
    banner.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><strong style="font-size:13px;">📱 Add to iPhone Home Screen</strong><button onclick="this.parentElement.remove()" style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:18px;">×</button></div>Tap <strong>Share ⬆️</strong> then <strong>"Add to Home Screen"</strong>`;
    document.body.appendChild(banner);
    setTimeout(()=>banner.remove(),12000);
  }
}
checkIOSInstall();
initApp();
